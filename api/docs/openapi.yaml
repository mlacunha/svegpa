  /api/amostra-coletada/{id_ti}:
    get:
      tags: [Amostra Coletada]
      summary: Listar amostras por termo
      parameters:
        - $ref: '#/components/parameters/IdTiPath'
      responses:
        '200':
          description: Lista
  /api/amostra-coletada/{id_ti}/{id}:
    put:
      tags: [Amostra Coletada]
      summary: Atualizar amostra
      parameters:
        - $ref: '#/components/parameters/IdTiPath'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmostraColetadaInput'
      responses:
        '200':
          description: Atualizado
    delete:
      tags: [Amostra Coletada]
      summary: Excluir amostra
      parameters:
        - $ref: '#/components/parameters/IdTiPath'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Excluído

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  security:
    - bearerAuth: []

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 100
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    IdTiPath:
      name: id_ti
      in: path
      required: true
      schema:
        type: string
      description: ID do termo de inspeção

  schemas:
    ProgramaInput:
      type: object
      properties:
        id:
          type: string
        codigo:
          type: string
        nome:
          type: string
        nomes_comuns:
          type: string
        nome_cientifico:
          type: string
    RelatorioMapaInput:
      type: object
      required: [id_programa, ano, data]
      properties:
        id_programa:
          type: string
        ano:
          type: string
        data:
          type: string
        trimestre:
          type: integer
        orgao:
          type: string
        id_usuario:
          type: string
        termo_inspecao:
          type: integer
        termo_coleta:
          type: integer
        id_propriedade:
          type: string
        tipo_imovel:
          type: string
        municipio:
          type: string
        cultura:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        status:
          type: string
          enum: [NORMAL, SUSPEITA, FOCO]
    AreaInspecionadaInput:
      type: object
      required: [id_termo_inspecao, id_programa, numero_plantas, numero_inspecionadas]
      properties:
        id_termo_inspecao:
          type: string
        id_programa:
          type: string
        tipo_area:
          type: string
        nome_local:
          type: string
        especie:
          type: string
        variedade:
          type: string
        numero_plantas:
          type: integer
        numero_inspecionadas:
          type: integer
        numero_suspeitas:
          type: integer
        area_plantada:
          type: number
        obs:
          type: string
    AmostraColetadaInput:
      type: object
      required: [id_termo_inspecao, identificacao_coleta]
      properties:
        id_termo_inspecao:
          type: string
        identificacao_coleta:
          type: string
        id_area_inspecionada:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
    Error:
      type: object
      properties:
        error:
          type: string
