openapi: 3.0.3
info:
  title: API Sanveg
  description: |
    API REST do Sistema de Vigilância Epidemiológica (SVEG).
    Endpoints para cadastros, levantamentos e coleta de dados fitossanitários.

    **Recursos CRUD** (mesmo padrão de programas): propriedades, produtores, produtos,
    hospedeiros, orgaos, orgaos_tipos, cargos, estados, municipios, normas, unidades,
    termo_inspecao, dashboard_filtros, reg_atividade, reg_metas.
  version: 1.0.0
  contact:
    name: SVEG

servers:
  - url: http://localhost/Projetos/sanveg
    description: Servidor local
  - url: https://seu-dominio.com
    description: Produção (ajuste conforme deploy)

tags:
  - name: Auth
    description: Autenticação
  - name: Health
    description: Status do servidor
  - name: Programas
  - name: Propriedades
  - name: Produtores
  - name: Produtos
  - name: Hospedeiros
  - name: Órgãos
  - name: Tipos de Órgão
  - name: Cargos
  - name: Estados
  - name: Municípios
  - name: Normas
  - name: Unidades
  - name: Termo Inspeção
  - name: Relatório Mapa
  - name: Área Inspecionada
  - name: Amostra Coletada
  - name: Reg Atividade
  - name: Reg Metas
  - name: Dashboard Filtros

paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Autentica usuário e retorna token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login realizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      login:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
        '401':
          description: Credenciais inválidas

  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: Verifica se a API está online
      security: []
      responses:
        '200':
          description: API online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/programas:
    get:
      tags: [Programas]
      summary: Listar programas
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de programas
    post:
      tags: [Programas]
      summary: Criar programa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramaInput'
      responses:
        '201':
          description: Criado
        '400':
          description: Dados inválidos

  /api/programas/{id}:
    get:
      tags: [Programas]
      summary: Buscar programa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Programa encontrado
        '404':
          description: Não encontrado
    put:
      tags: [Programas]
      summary: Atualizar programa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramaInput'
      responses:
        '200':
          description: Atualizado
        '404':
          description: Não encontrado
    delete:
      tags: [Programas]
      summary: Excluir programa
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Excluído
        '404':
          description: Não encontrado

  /api/propriedades:
    get:
      tags: [Propriedades]
      summary: Listar propriedades
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Lista de propriedades
    post:
      tags: [Propriedades]
      summary: Criar propriedade
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: { type: string }
                municipio: { type: string }
                UF: { type: string }
      responses:
        '201':
          description: Criado
  /api/propriedades/{id}:
    get:
