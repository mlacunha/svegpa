<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>#map { position:absolute; top: 0; bottom: 0; left:0; right: 0 }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([-2.585981, -51.948701], 6.5);

        L.tileLayer('https://api.maptiler.com/maps/openstreetmap/{z}/{x}/{y}.jpg?key=95QZwbprRlfMzSuLGcsW', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Corrigindo a criação dos ícones
        var soybeanIcon = L.icon({
            iconUrl: './icones/soybean.png',
            iconSize: [35, 36],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        var cassavaIcon = L.icon({
            iconUrl: './icones/cassava.png',
            iconSize: [35, 36],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        
        var orangeIcon = L.icon({
            iconUrl: './icones/orange.png',
            iconSize: [20, 20],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
            
        // Usando variáveis diferentes para cada marcador
        var marker1 = L.marker([-1.4558, -48.5039], {icon: soybeanIcon}).addTo(map);
        var marker2 = L.marker([-1.4558, -48.6], {icon: cassavaIcon}).addTo(map);
        var marker3 = L.marker([-1.4558, -48.7], {icon: orangeIcon}).addTo(map);

        var circle = L.circle([-1.4558, -48.5039], {
            color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.1,
            radius: 10000
        }).addTo(map);

        var polygon = L.polygon([
            [-1.0, -49.0],
            [-2.0, -49.5],
            [-1.5, -50.5]
        ]).addTo(map);
        
        // Vinculando popups a cada marcador
        marker1.bindPopup("<b>Marcador 1</b><br>Soybean").openPopup();
        marker2.bindPopup("<b>Marcador 2</b><br>Cassava");
        marker3.bindPopup("<b>Marcador 3</b><br>Orange");
        circle.bindPopup("Eu sou um círculo.");
        polygon.bindPopup("Eu sou um polígono.");
    </script>   
</body>
</html>
